<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>香港往返目的地選擇器</title>
<style>
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    padding: 20px;
    background-color: #f9f9f9;
  }
  .form-group {
    max-width: 400px;
    margin: 0 auto;
    background: white;
    padding: 20px;
    border-radius: 8px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
  }
  .autocomplete-container {
    position: relative;
    width: 100%;
  }
  label {
    display: block;
    margin-bottom: 8px;
    font-weight: bold;
    color: #333;
  }
  #locationInput {
    width: 100%;
    padding: 10px;
    font-size: 16px;
    border: 1px solid #ccc;
    border-radius: 4px;
    box-sizing: border-box;
  }
  #locationInput:focus {
    outline: none;
    border-color: #007BFF;
    box-shadow: 0 0 5px rgba(0,123,255,0.3);
  }
  .dropdown-content {
    display: none;
    position: absolute;
    top: 100%;
    left: 0;
    border: 1px solid #ccc;
    border-top: none;
    background-color: white;
    width: 100%;
    max-height: 350px;
    overflow-y: auto;
    z-index: 1000;
    border-radius: 0 0 4px 4px;
    box-shadow: 0 4px 6px rgba(0,0,0,0.1);
  }
  .category-title {
    font-weight: bold;
    background-color: #e3f2fd;
    padding: 8px 12px;
    color: #0056b3;
    font-size: 14px;
    pointer-events: none;
  }
  .location-item {
    padding: 10px 15px;
    cursor: pointer;
    border-bottom: 1px solid #f1f1f1;
    color: #444;
  }
  .location-item:last-child {
    border-bottom: none;
  }
  .location-item:hover {
    background-color: #f1f1f1;
    color: #000;
  }
  .route-display {
    margin-top: 15px;
    padding: 10px;
    background-color: #e8f5e9;
    color: #2e7d32;
    border-radius: 4px;
    font-weight: bold;
    display: none; /* 預設隱藏，選好才顯示 */
  }
</style>
</head>
<body>

<div class="form-group">
  <div class="autocomplete-container">
    <label for="locationInput">選擇目的地 (系統將自動配對香港往返):</label>
    <input type="text" id="locationInput" placeholder="輸入城市或機場 (如: 東京, TPE)..." autocomplete="off">
    <div id="dropdownList" class="dropdown-content"></div>
  </div>
  
  <div id="routeDisplay" class="route-display">
    </div>
</div>

<script>
// 1. 擴充後的香港往返地點分類資料庫
const locationsData = {
  "日韓台": [
    "東京成田 (NRT)", "東京羽田 (HND)", "大阪關西 (KIX)", "名古屋 (NGO)", "福岡 (FUK)", "札幌新千歲 (CTS)", "沖繩那霸 (OKA)",
    "首爾仁川 (ICN)", "首爾金浦 (GMP)", "釜山 (PUS)", "濟州 (CJU)",
    "台北桃園 (TPE)", "台北松山 (TSA)", "高雄 (KHH)", "台中 (RMQ)"
  ],
  "東南亞": [
    "曼谷蘇凡納布 (BKK)", "曼谷廊曼 (DMK)", "布吉 (HKT)", "清邁 (CNX)",
    "新加坡 (SIN)", "吉隆坡 (KUL)", "檳城 (PEN)", "亞庇/沙巴 (BKI)",
    "胡志明市 (SGN)", "河內 (HAN)", "峴港 (DAD)",
    "馬尼拉 (MNL)", "宿霧 (CEB)", "峇里島 (DPS)", "雅加達 (CGK)"
  ],
  "歐洲": [
    "倫敦希思路 (LHR)", "倫敦蓋特威克 (LGW)", "曼徹斯特 (MAN)",
    "巴黎戴高樂 (CDG)", "法蘭克福 (FRA)", "慕尼黑 (MUC)",
    "阿姆斯特丹 (AMS)", "馬德里 (MAD)", "巴塞隆拿 (BCN)",
    "羅馬 (FCO)", "米蘭 (MXP)", "蘇黎世 (ZRH)", "維也納 (VIE)", "伊斯坦堡 (IST)"
  ],
  "美洲": [
    "紐約甘迺迪 (JFK)", "紐約紐華克 (EWR)", "洛杉磯 (LAX)", "三藩市 (SFO)", 
    "芝加哥 (ORD)", "波士頓 (BOS)", "西雅圖 (SEA)",
    "溫哥華 (YVR)", "多倫多 (YYZ)"
  ],
  "澳紐": [
    "悉尼 (SYD)", "墨爾本 (MEL)", "布里斯本 (BNE)", "珀斯 (PER)", "阿德萊德 (ADL)",
    "奧克蘭 (AKL)", "基督城 (CHC)"
  ]
};

const inputField = document.getElementById('locationInput');
const dropdownList = document.getElementById('dropdownList');
const routeDisplay = document.getElementById('routeDisplay');

// 2. 渲染下拉選單的函數
function renderDropdown(filterText = '') {
  dropdownList.innerHTML = ''; 
  let hasResults = false;

  for (const [category, places] of Object.entries(locationsData)) {
    const filteredPlaces = places.filter(place => 
      place.toLowerCase().includes(filterText.toLowerCase())
    );

    if (filteredPlaces.length > 0) {
      hasResults = true;
      
      const categoryDiv = document.createElement('div');
      categoryDiv.className = 'category-title';
      categoryDiv.textContent = category;
      dropdownList.appendChild(categoryDiv);

      filteredPlaces.forEach(place => {
        const itemDiv = document.createElement('div');
        itemDiv.className = 'location-item';
        itemDiv.textContent = place;
        
        // 當客人點擊選項時的動作
        itemDiv.addEventListener('click', () => {
          inputField.value = place;
          dropdownList.style.display = 'none';
          
          // 更新並顯示完整航線給客人確認
          routeDisplay.innerHTML = `
            去程: 香港 (HKG) ✈️ ${place} <br>
            回程: ${place} ✈️ 香港 (HKG)
          `;
          routeDisplay.style.display = 'block';
        });
        
        dropdownList.appendChild(itemDiv);
      });
    }
  }

  dropdownList.style.display = hasResults ? 'block' : 'none';
}

// 3. 監聽輸入框事件
inputField.addEventListener('input', (e) => {
  renderDropdown(e.target.value);
  routeDisplay.style.display = 'none'; // 重新輸入時隱藏航線確認
});

inputField.addEventListener('focus', () => {
  renderDropdown(inputField.value);
});

// 4. 點擊畫面其他地方時隱藏選單
document.addEventListener('click', (e) => {
  if (!e.target.closest('.autocomplete-container')) {
    dropdownList.style.display = 'none';
  }
});
</script>

</body>
</html>
